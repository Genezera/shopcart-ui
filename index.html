<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark light" />
    <title>ShopCart UI</title>
    <meta
      name="description"
      content="Catálogo com filtros/pesquisa, carrinho e persistência em LocalStorage."
    />
    <link rel="stylesheet" href="./styles.css" />
    <script type="module" src="./app.js"></script>
  </head>
  <body>
    <header class="top">
      <div class="container top__inner">
        <div>
          <a class="back" href="./README.md">README</a>
          <h1 class="title">ShopCart UI</h1>
          <p class="subtitle">Catálogo • Filtros • Carrinho • LocalStorage</p>
        </div>

        <button class="cart-btn" type="button" data-open-cart>
          <span class="cart-btn__icon" aria-hidden="true">🛒</span>
          <span>Carrinho</span>
          <span class="cart-btn__count" data-cart-count>0</span>
        </button>
      </div>

      <div class="container controls" aria-label="Filtros">
        <label class="control">
          <span class="control__label">Buscar</span>
          <input
            class="control__input"
            type="search"
            placeholder="Ex.: fone, teclado, mochila..."
            autocomplete="off"
            data-search
          />
        </label>

        <label class="control">
          <span class="control__label">Categoria</span>
          <select class="control__input" data-category></select>
        </label>

        <label class="control">
          <span class="control__label">Ordenar</span>
          <select class="control__input" data-sort>
            <option value="featured" selected>Destaques</option>
            <option value="price-asc">Preço: menor → maior</option>
            <option value="price-desc">Preço: maior → menor</option>
            <option value="name-asc">Nome: A → Z</option>
          </select>
        </label>
      </div>
    </header>

    <main class="container">
      <section class="summary" aria-label="Resumo">
        <div class="summary__pill">
          <span class="muted">Resultados</span>
          <strong data-result-count>0</strong>
        </div>
        <button class="btn btn--ghost" type="button" data-clear-filters>
          Limpar filtros
        </button>
      </section>

      <section class="grid" aria-label="Produtos" data-products></section>
    </main>

    <aside class="drawer" hidden data-drawer aria-label="Carrinho">
      <div class="drawer__panel" role="dialog" aria-modal="true" aria-label="Carrinho">
        <header class="drawer__header">
          <h2 class="drawer__title">Seu carrinho</h2>
          <button class="icon-btn" type="button" aria-label="Fechar" data-close-cart>
            ✕
          </button>
        </header>

        <div class="drawer__content">
          <div class="cart" data-cart-items></div>
        </div>

        <footer class="drawer__footer">
          <div class="totals">
            <div class="totals__row">
              <span class="muted">Subtotal</span>
              <strong data-subtotal>R$ 0,00</strong>
            </div>
            <div class="totals__row">
              <span class="muted">Frete</span>
              <strong data-shipping>R$ 0,00</strong>
            </div>
            <div class="totals__row totals__row--total">
              <span>Total</span>
              <strong data-total>R$ 0,00</strong>
            </div>
          </div>
          <button class="btn btn--primary" type="button" data-checkout>
            Finalizar (UI)
          </button>
          <button class="btn btn--ghost" type="button" data-clear-cart>
            Limpar carrinho
          </button>
        </footer>
      </div>
    </aside>

    <div class="toast" role="status" aria-live="polite" aria-atomic="true" hidden data-toast></div>
  </body>
</html>
