<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark light" />
    <title>ShopCart UI</title>
    <meta
      name="description"
      content="Product catalog with search/filters, cart drawer, and LocalStorage persistence."
    />
    <meta name="theme-color" content="#0B1220" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="ShopCart UI" />
    <meta
      property="og:description"
      content="Product catalog with search/filters, cart drawer, and LocalStorage persistence."
    />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="ShopCart UI" />
    <meta
      name="twitter:description"
      content="Product catalog with search/filters, cart drawer, and LocalStorage persistence."
    />

    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' x2='1'%3E%3Cstop stop-color='%236ee7ff'/%3E%3Cstop offset='1' stop-color='%23a78bfa'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='16' fill='%230b1220'/%3E%3Cpath d='M22 20h2l2 18h16l2-12H27.2l-.4-4H48v-2H24l-.6-4H18v2h3.6z' fill='url(%23g)'/%3E%3Ccircle cx='30' cy='44' r='3' fill='url(%23g)'/%3E%3Ccircle cx='44' cy='44' r='3' fill='url(%23g)'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script type="module" src="./app.js"></script>
  </head>
  <body>
    <header class="top">
      <div class="container top__inner">
        <div>
          <a class="back" href="./README.md">README</a>
          <h1 class="title">ShopCart UI</h1>
          <p class="subtitle">Catalog • Filters • Cart • LocalStorage</p>
        </div>

        <button class="cart-btn" type="button" data-open-cart>
          <span class="cart-btn__icon" aria-hidden="true">🛒</span>
          <span>Cart</span>
          <span class="cart-btn__count" data-cart-count>0</span>
        </button>
      </div>

      <div class="container controls" aria-label="Filters">
        <label class="control">
          <span class="control__label">Search</span>
          <input
            class="control__input"
            type="search"
            placeholder='e.g. "headphones", "keyboard", "backpack"...'
            autocomplete="off"
            data-search
          />
        </label>

        <label class="control">
          <span class="control__label">Category</span>
          <select class="control__input" data-category></select>
        </label>

        <label class="control">
          <span class="control__label">Sort</span>
          <select class="control__input" data-sort>
            <option value="featured" selected>Featured</option>
            <option value="price-asc">Price: low → high</option>
            <option value="price-desc">Price: high → low</option>
            <option value="name-asc">Name: A → Z</option>
          </select>
        </label>
      </div>
    </header>

    <main class="container">
      <section class="summary" aria-label="Summary">
        <div class="summary__pill">
          <span class="muted">Results</span>
          <strong data-result-count>0</strong>
        </div>
        <button class="btn btn--ghost" type="button" data-clear-filters>
          Clear filters
        </button>
      </section>

      <section class="grid" aria-label="Products" data-products></section>
    </main>

    <aside class="drawer" hidden data-drawer aria-label="Cart">
      <div class="drawer__panel" role="dialog" aria-modal="true" aria-label="Cart">
        <header class="drawer__header">
          <h2 class="drawer__title">Your cart</h2>
          <button class="icon-btn" type="button" aria-label="Close" data-close-cart>
            ✕
          </button>
        </header>

        <div class="drawer__content">
          <div class="cart" data-cart-items></div>
        </div>

        <footer class="drawer__footer">
          <div class="totals">
            <div class="totals__row">
              <span class="muted">Subtotal</span>
              <strong data-subtotal>$0.00</strong>
            </div>
            <div class="totals__row">
              <span class="muted">Shipping</span>
              <strong data-shipping>$0.00</strong>
            </div>
            <div class="totals__row totals__row--total">
              <span>Total</span>
              <strong data-total>$0.00</strong>
            </div>
          </div>
          <button class="btn btn--primary" type="button" data-checkout>
            Checkout (UI)
          </button>
          <button class="btn btn--ghost" type="button" data-clear-cart>
            Clear cart
          </button>
        </footer>
      </div>
    </aside>

    <div class="toast" role="status" aria-live="polite" aria-atomic="true" hidden data-toast></div>
  </body>
</html>
